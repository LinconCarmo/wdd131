<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Submit a product review by selecting a product, rating its performance, choosing useful features, and sharing your feedback.">

    <meta name="author"
          content="Lincon Carmo">

    <title>Product Review Form</title>

    <link rel="stylesheet" href="styles/form.css">

    <script src="scripts/products.js" defer></script>
    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review</h1>
</header>

<main>

    <form action="review.html" method="get">

        <div class="form-group">
            <label for="productName">
                Product Name
                <span class="required">*</span>
            </label>

            <select
                id="productName"
                name="productName"
                required>

                <option value="" selected disabled>
                    Select a Product ...
                </option>

            </select>
        </div>

        <fieldset>

            <legend>
                Overall Rating
                <span class="required">*</span>
            </legend>

            <div class="rating-container">

                <div>
                    <input
                        type="radio"
                        id="rating1"
                        name="rating"
                        value="1"
                        required>

                    <label for="rating1">★</label>
                </div>

                <div>
                    <input
                        type="radio"
                        id="rating2"
                        name="rating"
                        value="2"
                        required>

                    <label for="rating2">★★</label>
                </div>

                <div>
                    <input
                        type="radio"
                        id="rating3"
                        name="rating"
                        value="3"
                        required>

                    <label for="rating3">★★★</label>
                </div>

                <div>
                    <input
                        type="radio"
                        id="rating4"
                        name="rating"
                        value="4"
                        required>

                    <label for="rating4">★★★★</label>
                </div>

                <div>
                    <input
                        type="radio"
                        id="rating5"
                        name="rating"
                        value="5"
                        required>

                    <label for="rating5">★★★★★</label>
                </div>

            </div>

        </fieldset>

        <div class="form-group">

            <label for="installDate">
                Date of Installation
                <span class="required">*</span>
            </label>

            <input
                type="date"
                id="installDate"
                name="installDate"
                required>

        </div>

        <fieldset>

            <legend>Useful Features</legend>

            <div class="checkbox-group">

                <input
                    type="checkbox"
                    id="durability"
                    name="features"
                    value="Durability">

                <label for="durability">
                    Durability
                </label>

            </div>

            <div class="checkbox-group">

                <input
                    type="checkbox"
                    id="easeOfUse"
                    name="features"
                    value="Ease of Use">

                <label for="easeOfUse">
                    Ease of Use
                </label>

            </div>

            <div class="checkbox-group">

                <input
                    type="checkbox"
                    id="performance"
                    name="features"
                    value="Performance">

                <label for="performance">
                    Performance
                </label>

            </div>

            <div class="checkbox-group">

                <input
                    type="checkbox"
                    id="design"
                    name="features"
                    value="Design">

                <label for="design">
                    Design
                </label>

            </div>

        </fieldset>

        <div class="form-group">

            <label for="review">
                Written Review
            </label>

            <textarea
                id="review"
                name="review"
                rows="5"></textarea>

        </div>

        <div class="form-group">

            <label for="username">
                User Name
            </label>

            <input
                type="text"
                id="username"
                name="username">

        </div>

        <input
            type="submit"
            value="Submit Review"
            class="submit-btn">

    </form>

</main>

<footer>

    <p>
        &copy;
        <span id="currentyear"></span>
        | Lincon Carmo | Brazil
    </p>

    <p id="lastModified"></p>

</footer>

</body>
</html>
